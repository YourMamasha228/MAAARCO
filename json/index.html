<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>JSON пример</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page">
        <h1>JSON.stringify и JSON.parse</h1>
        
        <!-- Зона А: Профиль -->
        <div class="block">
            <h2>А. Профиль (ввод данных)</h2>
            
            <div class="field">
                <label>Имя (userName):</label>
                <input type="text" id="userName" value="Анна">
            </div>
            
            <div class="field">
                <label>Возраст (age):</label>
                <input type="text" id="age" value="20">
            </div>
            
            <div class="field">
                <label>Студент? (isStudent):</label>
                <input type="checkbox" id="isStudent" checked>
            </div>
            
            <div class="field">
                <label>Город (city):</label>
                <input type="text" id="city" value="Москва">
            </div>
            
            <div class="field">
                <label>Группа (group):</label>
                <input type="text" id="group" value="ИС-21">
            </div>
            
            <div class="field">
                <label>Email:</label>
                <input type="text" id="email" value="anna@mail.ru">
            </div>
            
            <div class="field">
                <label>Теги (через запятую):</label>
                <input type="text" id="tags" value="js,html,css">
            </div>
            
            <button id="buildBtn">Собрать объект</button>
            <button id="problemBtn">Добавить проблемные поля</button>
            
            <div class="result-box">
                <p><b>Текущий объект:</b></p>
                <pre id="objectShow">{}</pre>
            </div>
        </div>
        
        <!-- Зона B: Экспорт -->
        <div class="block">
            <h2>Б. Экспорт (stringify)</h2>
            
            <div class="field">
                <label>Пробелы (space):</label>
                <select id="spaceSelect">
                    <option value="0">0 - без пробелов</option>
                    <option value="2" selected>2 - с отступами</option>
                    <option value="4">4 - большие отступы</option>
                </select>
            </div>
            
            <div class="check-group">
                <p><b>Какие ключи оставить:</b></p>
                <label><input type="checkbox" class="keyCheck" value="id" checked> id</label>
                <label><input type="checkbox" class="keyCheck" value="userName" checked> userName</label>
                <label><input type="checkbox" class="keyCheck" value="age" checked> age</label>
                <label><input type="checkbox" class="keyCheck" value="isStudent" checked> isStudent</label>
                <label><input type="checkbox" class="keyCheck" value="tags" checked> tags</label>
                <label><input type="checkbox" class="keyCheck" value="profile" checked> profile</label>
                <label><input type="checkbox" class="keyCheck" value="createdAt" checked> createdAt</label>
            </div>
            
            <div style="margin: 10px 0;">
                <button id="exportSimple">Обычный экспорт</button>
                <button id="exportArray">Экспорт (фильтр ключей)</button>
                <button id="exportFunc">Экспорт (функция)</button>
            </div>
            
            <label>Результат:</label>
            <textarea id="jsonOut" rows="6" readonly></textarea>
        </div>
        
        <!-- Зона C: Импорт -->
        <div class="block">
            <h2>В. Импорт (parse)</h2>
            
            <label>Введите JSON:</label>
            <textarea id="jsonIn" rows="6"></textarea>
            
            <button id="importBtn">Импортировать</button>
            
            <div class="result-box">
                <p><b>Результат:</b></p>
                <pre id="importShow">—</pre>
            </div>
            
            <div class="error" id="errorBox" style="display: none;">
                <p>Ошибка: <span id="errorMsg"></span></p>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
