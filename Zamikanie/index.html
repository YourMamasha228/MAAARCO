<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Персонаж: Кот-вымогатель</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="your-character">
        <!-- Здесь должна быть ваша картинка. Создайте папку img и положите туда картинку -->
        <img class="character" src="./Zelensky_clown_meme.jpg" alt="character">
    </div>
    <div class="container">
        <div class="states">
            <!-- Статистика -->
            <div class="state" id="water">
                <div class="name">Вода</div>
                <span class="count"></span>
            </div>
            <div class="state" id="food">
                <div class="name">Еда</div>
                <span class="count"></span>
            </div>
            <div class="state" id="energy">
                <div class="name">Энергия</div>
                <span class="count"></span>
            </div>
        </div>
        <div class="actions">
            <button class="action" id="drink">Выпить</button>
            <button class="action" id="eat">Поесть</button>
            <button class="action" id="rest">Отдохнуть</button>
        </div>
    </div>

    <div class="alert" style="display: none;">Персонаж умер от жадности... Перезагрузите страницу, чтобы начать сначала</div>

    <script src="script.js"></script>
</body>
</html>
